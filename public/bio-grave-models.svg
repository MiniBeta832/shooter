<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="720" viewBox="0 0 1200 720">
  <defs>
    <radialGradient id="bgGlow" cx="50%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#1a2e1d"/>
      <stop offset="60%" stop-color="#08130b"/>
      <stop offset="100%" stop-color="#050809"/>
    </radialGradient>
    <linearGradient id="toxicCore" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#c3ff6a"/>
      <stop offset="100%" stop-color="#39c465"/>
    </linearGradient>
    <linearGradient id="radShell" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#102417"/>
      <stop offset="100%" stop-color="#0a1510"/>
    </linearGradient>
    <linearGradient id="bruiserShell" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1f3a28"/>
      <stop offset="100%" stop-color="#0d1711"/>
    </linearGradient>
    <linearGradient id="bossShell" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#122418"/>
      <stop offset="100%" stop-color="#07130c"/>
    </linearGradient>
    <linearGradient id="ringGlow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#2bff6b"/>
      <stop offset="100%" stop-color="#7cff91"/>
    </linearGradient>
    <filter id="softGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1200" height="720" fill="url(#bgGlow)"/>

  <text x="70" y="80" font-family="Segoe UI, Arial, sans-serif" font-size="28" letter-spacing="4" fill="#7cff91">
    BIO GRAVE - MODELOS
  </text>
  <text x="70" y="118" font-family="Segoe UI, Arial, sans-serif" font-size="14" letter-spacing="2" fill="#b3f5c5">
    Enemigos radioactivos con brillo verde toxico
  </text>

  <!-- Card 1: Rad Stalker -->
  <g transform="translate(80 170)">
    <rect x="0" y="0" width="320" height="450" rx="24" fill="#0b1510" stroke="#1c2f24" stroke-width="2"/>
    <text x="28" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7cff91">RAD STALKER</text>
    <text x="28" y="75" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#b3f5c5">Velocidad alta, escamas toxicas.</text>
    <g transform="translate(60 120)">
      <ellipse cx="100" cy="200" rx="90" ry="120" fill="url(#radShell)" stroke="#1d3524" stroke-width="2"/>
      <circle cx="100" cy="175" r="36" fill="url(#toxicCore)" filter="url(#softGlow)"/>
      <circle cx="100" cy="175" r="16" fill="#dcff8f"/>
      <rect x="50" y="86" width="20" height="90" rx="10" fill="#0c1d12"/>
      <rect x="130" y="86" width="20" height="90" rx="10" fill="#0c1d12"/>
      <circle cx="58" cy="90" r="8" fill="#7cff91"/>
      <circle cx="142" cy="90" r="8" fill="#7cff91"/>
      <path d="M20 240 L45 220 L55 250 L28 272 Z" fill="#15281c"/>
      <path d="M180 240 L155 220 L145 250 L172 272 Z" fill="#15281c"/>
      <circle cx="40" cy="250" r="6" fill="#2bff6b"/>
      <circle cx="160" cy="250" r="6" fill="#2bff6b"/>
    </g>
  </g>

  <!-- Card 2: Spore Bruiser -->
  <g transform="translate(440 170)">
    <rect x="0" y="0" width="320" height="450" rx="24" fill="#0b1510" stroke="#1c2f24" stroke-width="2"/>
    <text x="28" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7cff91">SPORE BRUISER</text>
    <text x="28" y="75" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#b3f5c5">Tanque pesado con nucleos verdes.</text>
    <g transform="translate(50 120)">
      <rect x="40" y="80" width="180" height="210" rx="42" fill="url(#bruiserShell)" stroke="#1c2f24" stroke-width="2"/>
      <circle cx="130" cy="160" r="44" fill="url(#toxicCore)" filter="url(#softGlow)"/>
      <circle cx="130" cy="160" r="18" fill="#dcff8f"/>
      <rect x="70" y="40" width="30" height="80" rx="12" fill="#0f1d14"/>
      <rect x="160" y="40" width="30" height="80" rx="12" fill="#0f1d14"/>
      <circle cx="85" cy="40" r="10" fill="#7cff91"/>
      <circle cx="175" cy="40" r="10" fill="#7cff91"/>
      <rect x="20" y="170" width="50" height="120" rx="22" fill="#12241a"/>
      <rect x="190" y="170" width="50" height="120" rx="22" fill="#12241a"/>
      <circle cx="45" cy="230" r="8" fill="#39c465"/>
      <circle cx="215" cy="230" r="8" fill="#39c465"/>
      <circle cx="70" cy="290" r="10" fill="#2bff6b"/>
      <circle cx="190" cy="290" r="10" fill="#2bff6b"/>
    </g>
  </g>

  <!-- Card 3: Radlord Prime -->
  <g transform="translate(800 170)">
    <rect x="0" y="0" width="320" height="450" rx="24" fill="#0b1510" stroke="#1c2f24" stroke-width="2"/>
    <text x="28" y="48" font-family="Segoe UI, Arial, sans-serif" font-size="20" fill="#7cff91">RADLORD PRIME</text>
    <text x="28" y="75" font-family="Segoe UI, Arial, sans-serif" font-size="13" fill="#b3f5c5">Boss toxico con aura radioactiva.</text>
    <g transform="translate(35 110)">
      <circle cx="125" cy="210" r="110" fill="url(#bossShell)" stroke="#203827" stroke-width="2"/>
      <circle cx="125" cy="190" r="42" fill="url(#toxicCore)" filter="url(#softGlow)"/>
      <circle cx="125" cy="190" r="18" fill="#dcff8f"/>
      <ellipse cx="125" cy="210" rx="140" ry="22" fill="none" stroke="url(#ringGlow)" stroke-width="6"/>
      <ellipse cx="125" cy="230" rx="165" ry="26" fill="none" stroke="#2bff6b" stroke-width="3" opacity="0.7"/>
      <g filter="url(#softGlow)">
        <circle cx="20" cy="210" r="10" fill="#2bff6b"/>
        <circle cx="55" cy="250" r="8" fill="#7cff91"/>
        <circle cx="210" cy="250" r="8" fill="#7cff91"/>
        <circle cx="235" cy="210" r="10" fill="#2bff6b"/>
        <circle cx="90" cy="120" r="6" fill="#2bff6b"/>
        <circle cx="160" cy="120" r="6" fill="#2bff6b"/>
      </g>
    </g>
  </g>

  <text x="70" y="660" font-family="Segoe UI, Arial, sans-serif" font-size="14" fill="#8fdc9f">
    Nota: modelos conceptuales estilizados para UI/seleccion, tonos verdes radioactivos.
  </text>
</svg>
